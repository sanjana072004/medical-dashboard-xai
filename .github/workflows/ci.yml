name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 black isort
      - name: Lint with flake8
        run: |
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Check formatting with black
        working-directory: ./backend
        run: |
          black --check app/ || true
      - name: Check import order with isort
        working-directory: ./backend
        run: |
          isort --check-only app/ || true
      - name: Run backend tests
        working-directory: ./backend
        run: |
          pytest -v --tb=short 2>&1 || echo "Tests completed with status $?"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install frontend deps
        working-directory: ./frontend
        run: |
          npm ci
      - name: Run linting
        working-directory: ./frontend
        run: |
          npm run lint 2>&1 || echo "Linting completed"
      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm run build

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: medical-dashboard:backend-latest
      - name: Build frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: medical-dashboard:frontend-latest
