version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: medical-dashboard-backend
    ports:
      - "8000:8000"
    environment:
      - FASTAPI_ENV=${FASTAPI_ENV:-development}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./test.db}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./backend:/app/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - medical-dashboard-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medical-dashboard-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    volumes:
      - ./frontend:/app
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - medical-dashboard-network
    command: npm run dev

networks:
  medical-dashboard-network:
    driver: bridge
